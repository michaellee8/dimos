common:
    lid_topic:  "/livox/lidar"
    imu_topic:  "/livox/imu"
    time_sync_en: false         # ONLY turn on when external time synchronization is really not possible
    time_offset_lidar_to_imu: 0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
                                  # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0

preprocess:
    lidar_type: 1                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR,
    scan_line: 4
    blind: 0.5

mapping:
    # acc_cov is the divergence guard. At the upstream default (0.1) FAST-LIO
    # odometry runs away to km/s on aggressive Go2 motion — the IMU acceleration
    # prediction dominates the IESKF and diverges. Raising acc_cov down-weights
    # that prediction. On the ruwik2_pt3 raw pcap the threshold is sharp between
    # 0.3 (diverges) and 0.35 (bounded); 0.5 holds with margin (reliably bounded
    # across reps, peak ~5 m/s, matching Point-LIO). See jhist
    # dimos-fastlio-velocity-spike.md (2026-06-13 correction).
    acc_cov: 0.5
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    # Scan voxel that feeds the IESKF. NOTE: an earlier finding that voxel 0.1 m
    # bounds the velocity divergence turned out to be a re-encoding artifact
    # (measured on a bag with synthesized per-point timestamps). On the raw pcap,
    # voxel size does NOT bound divergence at any value — acc_cov above is the
    # real guard. 0.1 m retained only for scan density, not for stability.
    # See jhist dimos-fastlio-velocity-spike.md (2026-06-13 correction).
    filter_size_surf: 0.1
    filter_size_map: 0.1
    fov_degree:    360
    det_range:     100.0
    extrinsic_est_en:  false      # true: enable the online estimation of IMU-LiDAR extrinsic
    extrinsic_T: [ -0.011, -0.02329, 0.04412 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1]

publish:
    path_en:  false
    scan_publish_en:  true       # false: close all the point cloud output
    dense_publish_en: true       # false: low down the points number in a global-frame point clouds scan.
    scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame

pcd_save:
    pcd_save_en: true
    interval: -1                 # how many LiDAR frames saved in each pcd file;
                                 # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.
