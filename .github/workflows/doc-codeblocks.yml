# Issue #1759 - execute documentation code blocks in CI (md-babel-py).
#
# Policy (matches issue author):
# - Behavior and fence flags (`skip`, `expected-error`, sessions, etc.) follow
#   docs/agents/docs/codeblocks.md.
# - If a block is broken and the fix is not obvious, contributors may mark the
#   fence with `skip` (or `expected-error` where appropriate) and fix later;
#   until then, this job fails on execution errors so drift is visible.
# - For now this job only verifies that covered code blocks execute in CI.
#   A follow-up can re-enable auto-committing refreshed <!--Result:--> /
#   generated assets back onto the PR branch.
name: doc-codeblocks
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'dimos/**'
      - 'docs/**'
      - 'README.md'
      - 'bin/run-doc-codeblocks'
      - '.github/workflows/doc-codeblocks.yml'
      - 'pyproject.toml'
      - 'uv.lock'

permissions:
  contents: read
  packages: read
  pull-requests: read

jobs:
  md-babel:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    timeout-minutes: 60
    runs-on: [self-hosted, Linux]
    container:
      image: ghcr.io/dimensionalos/ros-dev:dev

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          clean: false
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ github.token }}

      - name: Fix permissions
        run: |
          git config --global --add safe.directory '*'
          git clean -ffdx -e .venv

      # Docs decode JPEG from SQLite via PyTurboJPEG; it needs the system lib (see docs/installation/ubuntu.md).
      # macOS dev machines often have libjpeg-turbo from Homebrew; the ros-dev container does not by default.
      # Examples also use get_data() which resolves Git LFS blobs under tests/data.
      - name: Install TurboJPEG and pull Git LFS for doc examples
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y git-lfs libturbojpeg
          git lfs install
          git lfs pull

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          uv sync --all-extras --no-extra dds --no-extra unitree-dds --frozen
          uv pip install matplotlib httpx

      - name: Remove pydrake stubs
        run: |
          find .venv/lib/*/site-packages/pydrake -name '*.pyi' -delete 2>/dev/null || true

      # Match ci.yml: wrap commands in /entrypoint.sh so ROS setup.bash runs (same shell env as pytest).
      - name: Execute documentation code blocks
        run: /entrypoint.sh bash -c "./bin/run-doc-codeblocks --ci --no-cache"
