name: ci
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancels runs from previous pushes in a PR.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions: {}

env:
  # Disable default package installs. Each job should explicitly install a group.
  UV_NO_SYNC: "1"

jobs:
  lint:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read  # For checkout

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install lint dependencies
        run: uv sync --only-group lint --frozen
      - name: Mypy
        run: uv run mypy
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  rust:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: read  # For checkout

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Find Cargo workspace roots
        id: find-crates
        run: |
          crates=$(find . -name Cargo.lock \
            -not -path './target/*' \
            -not -path './.venv/*' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -printf '%h\n' \
            | sed 's|^\./||' \
            | sort)
          echo "Found Rust workspace roots:"
          echo "$crates"
          {
            echo "crates<<EOF"
            echo "$crates"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ steps.find-crates.outputs.crates }}
      - name: cargo fmt
        env:
          CRATES: ${{ steps.find-crates.outputs.crates }}
        run: |
          for crate in $CRATES; do
            (cd "$crate" && cargo fmt --all -- --check)
          done
      - name: cargo clippy
        env:
          CRATES: ${{ steps.find-crates.outputs.crates }}
        run: |
          for crate in $CRATES; do
            (cd "$crate" && cargo clippy --workspace --all-targets --all-features --locked -- -D warnings)
          done
      - name: cargo test
        env:
          CRATES: ${{ steps.find-crates.outputs.crates }}
        run: |
          for crate in $CRATES; do
            (cd "$crate" && cargo test --workspace --all-features --locked)
          done

  md-babel:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read  # For checkout

    steps:
      - uses: actions/checkout@v6
      - name: Fetch LFS data needed by doc code blocks
        run: git lfs pull --include="data/.lfs/go2_bigoffice.db.tar.gz,data/.lfs/unitree_go2_bigoffice_map.pickle.tar.gz"
      # Docs decode JPEG from SQLite via PyTurboJPEG; pyaudio needs portaudio.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libturbojpeg portaudio19-dev
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install Python dependencies
        run: uv sync --group tests --frozen
      - name: Execute documentation code blocks
        run: ./bin/run-doc-codeblocks --ci --no-cache

  docs-validate:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read  # For checkout

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false
          sparse-checkout: |
            docs

      - name: Pull docs LFS assets only
        run: git lfs pull --include="docs/assets/**" --exclude=""

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      # Temporarily disabled — Mintlify validation blocking CI
      # - name: Validate Mintlify docs
      #   working-directory: docs
      #   run: npm run validate

  full-release-test:
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ALIBABA_API_KEY: ${{ secrets.ALIBABA_API_KEY }}
      # Override skipif_in_ci so the release-tests job actually runs the
      # heavier tests the normal CI matrix opts out of.
      DIMOS_FULL_TEST_RUN: "1"
    timeout-minutes: 300
    runs-on: [self-hosted, Linux, large]
    permissions:
      contents: read  # For checkout
      packages: read  # For pulling the ros-dev container from ghcr.io
    container:
      image: ghcr.io/dimensionalos/ros-dev:dev
    steps:
      - uses: actions/checkout@v5
        with:
          clean: false
          persist-credentials: false
      - name: Fix permissions
        run: |
          git config --global --add safe.directory '*'
          git clean -ffdx
      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libturbojpeg zstd -y
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group tests-self-hosted --frozen
      - name: Install ZED SDK
        # Stereolabs proprietary SDK, distributed as a self-extracting .run
        # installer (not on apt/pip). `runtime_only` skips samples/headers/docs;
        # `skip_cuda` assumes libcuda/libcudart are already on the runner —
        # the SDK's .so files dlopen them at process start.
        # `get_python_api.py` is the SDK's installer for the `pyzed` Python
        # bindings against the venv's interpreter, so this step has to run
        # after `Install dependencies` (which provisions the venv).
        # curl: -f errors on HTTP failure, -L follows redirects, --retry
        # smooths transient network issues that would otherwise leave a
        # truncated .run file that fails decompression at extract time.
        run: |
          curl -fL --retry 5 --retry-delay 5 \
            -o /tmp/zed.run \
            https://download.stereolabs.com/zedsdk/5.0/cu12/ubuntu22
          chmod +x /tmp/zed.run
          # `skip_python` stops the SDK installer from auto-installing pyzed
          # for the system Python 3.10 (wasted, can't be reached from the
          # uv venv); we install for the venv's Python explicitly below.
          sudo /tmp/zed.run -- silent runtime_only skip_cuda skip_drivers skip_python
          rm /tmp/zed.run
          # get_python_api.py calls `python -m pip install`; uv venvs don't
          # ship pip by default, so add it before invoking the SDK installer.
          uv pip install pip
          uv run python /usr/local/zed/get_python_api.py
          echo "LD_LIBRARY_PATH=/usr/local/zed/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
      - name: Build C++ extensions in-place
        run: uv run python setup.py build_ext --inplace
      - name: Source ROS environment
        # The uv venv is sealed (include-system-site-packages = false), so
        # `import rclpy` / `ament_index_python` would fail. Sourcing the ROS
        # setup script and exporting PYTHONPATH/AMENT_PREFIX_PATH/etc into
        # GITHUB_ENV makes them importable from `uv run`.
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          {
            echo "PYTHONPATH=$PYTHONPATH"
            echo "AMENT_PREFIX_PATH=$AMENT_PREFIX_PATH"
            echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH"
            echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
            echo "ROS_DISTRO=$ROS_DISTRO"
            echo "ROS_VERSION=$ROS_VERSION"
            echo "ROS_PYTHON_VERSION=$ROS_PYTHON_VERSION"
          } >> "$GITHUB_ENV"
      - name: Pre-warm HuggingFace cache
        # Tests previously skipped via skipif_in_ci pull large model weights
        # from HF at fixture setup time. Pre-fetch here so the cost is paid
        # once and pytest doesn't trip its per-test timeout on the download.
        run: |
          for m in \
            openai/clip-vit-base-patch32 \
            microsoft/Florence-2-base \
            vikhyatk/moondream2 \
          ; do
            uv run huggingface-cli download "$m"
          done
      - name: Run full test suite
        # --error-for-skips ensures a misconfigured runner (missing env var /
        # dep) fails the release rather than silently passing on a smaller
        # subset. The marker excludes only `tool` (dev tooling).
        # --timeout=3600 overrides the 600s baseline in pyproject.toml's
        # addopts: formerly-skipped VLM tests run CPU inference on multi-GB
        # models and need an hour each. (PYTEST_TIMEOUT env var is the
        # lowest-priority knob and is shadowed by the addopts setting.)
        run: uv run pytest -m 'not tool' --error-for-skips --timeout=3600
      - name: Check disk space
        if: failure()
        run: df -h

  tests:
    timeout-minutes: 20
    strategy:
      matrix:
        pyver: ['3.10', '3.11', '3.12', '3.13', '3.14']
        os: ["ubuntu-latest"]
        experimental: [false]
        include:
          - os: "ubuntu-latest"
            pyver: "3.14t"
            experimental: false
          - os: "ubuntu-24.04-arm"
            pyver: "3.14"
            experimental: false
      fail-fast: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      contents: read  # For checkout
      id-token: write  # For codecov-action's OIDC upload

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          allow-prereleases: true
          python-version: ${{ matrix.pyver }}
      - name: Install dependency for pyaudio (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev
      - name: Install dependency for pyaudio (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install portaudio
      - name: Cap accidental LFS downloads at 1 MiB
        run: |
          sudo mv /usr/bin/git-lfs /usr/bin/git-lfs.orig
          sudo install -m 0755 bin/git-lfs-guard /usr/bin/git-lfs
          git config --global --unset-all filter.lfs.process || true
      - name: Set PYTHON_GIL=0 for free-threading builds
        if: ${{ endsWith(matrix.pyver, 't') }}
        run: echo "PYTHON_GIL=0" >> $GITHUB_ENV
      - name: Install dependencies
        run: uv sync --group tests --frozen
      - name: Run tests
        run: uv run pytest --numprocesses=3 --cov=dimos/ --junitxml=junit.xml -m 'not (tool or self_hosted or mujoco or self_hosted_large)'
      - name: Re-run the failing tests with maximum verbosity
        if: failure()
        env:
          COLOR: yes
        run: >-  # `exit 1` makes sure that the job remains red with flaky runs
          uv run pytest --no-cov -vvvvv --lf  -m 'not (tool or self_hosted or mujoco or self_hosted_large)' && exit 1
        shell: bash
      - name: Turn coverage into xml
        run: uv run python -m coverage xml
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./coverage.xml
          flags: OS-${{ matrix.os }},Py-${{ matrix.pyver }}
          use_oidc: true
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          report_type: test_results
          use_oidc: true

  self-hosted-tests:
    # Skip on PRs from forks which would expose the self-hosted runner to untrusted code from external contributors.
    if: |
      github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ALIBABA_API_KEY: ${{ secrets.ALIBABA_API_KEY }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            # GitHub Actions only honours `container:` on Linux runners.
            container:
              image: ghcr.io/dimensionalos/ros-dev:dev
            markers: "self_hosted or skipif_no_ros"
            experimental: false
          - os: macOS
            container: null  # run on host — `container:` is Linux-only
            markers: "self_hosted"
            experimental: true
    runs-on:
      - self-hosted
      - ${{ matrix.os }}
      - base
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      contents: read  # For checkout
      packages: read  # For pulling the ros-dev container from ghcr.io
      id-token: write  # For codecov-action's OIDC upload
    container: ${{ matrix.container }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          # If we ever allow external PRs on custom runner, persisting credentials
          # could be abused by attackers.
          persist-credentials: false
      - name: Fix permissions
        run: |
          git config --global --add safe.directory '*'
          git clean -ffdx
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group tests-self-hosted --frozen
      - name: Build C++ extensions in-place
        run: uv run python setup.py build_ext --inplace
      - name: Source ROS environment
        # The uv venv is sealed (include-system-site-packages = false), so
        # `import rclpy` / `ament_index_python` would fail. Sourcing the ROS
        # setup script and exporting PYTHONPATH/AMENT_PREFIX_PATH/etc into
        # GITHUB_ENV makes them importable from `uv run`.
        if: matrix.os == 'Linux'
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          {
            echo "PYTHONPATH=$PYTHONPATH"
            echo "AMENT_PREFIX_PATH=$AMENT_PREFIX_PATH"
            echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH"
            echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
            echo "ROS_DISTRO=$ROS_DISTRO"
            echo "ROS_VERSION=$ROS_VERSION"
            echo "ROS_PYTHON_VERSION=$ROS_PYTHON_VERSION"
          } >> "$GITHUB_ENV"
      - name: Run tests
        run: uv run pytest --cov=dimos/ --junitxml=junit.xml -m '(${{ matrix.markers }}) and not (tool or mujoco)'
      - name: Re-run the failing tests with maximum verbosity
        if: failure()
        env:
          COLOR: yes
        run: >-  # `exit 1` makes sure that the job remains red with flaky runs
          uv run pytest --no-cov -vvvvv --lf  -m '(${{ matrix.markers }}) and not (tool or mujoco)' && exit 1
        shell: bash
      - name: Turn coverage into xml
        run: uv run python -m coverage xml
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./coverage.xml
          flags: SelfHosted-${{ matrix.os }}
          use_oidc: true
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          report_type: test_results
          use_oidc: true
      - name: Check disk space
        if: failure()
        run: |
          df -h

  self-hosted-large-tests:
    # Skip on PRs from forks which would expose the self-hosted runner to untrusted code from external contributors.
    if: |
      github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ALIBABA_API_KEY: ${{ secrets.ALIBABA_API_KEY }}
      DIMSIM_RENDER: gpu
    timeout-minutes: 30
    runs-on: [self-hosted, Linux, large]
    permissions:
      contents: read  # For checkout
      packages: read  # For pulling the ros-dev container from ghcr.io
      id-token: write  # For codecov-action's OIDC upload

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          lfs: true
          # If we ever allow external PRs on custom runner, persisting credentials
          # could be abused by attackers.
          persist-credentials: false
      - name: Fix permissions
        # Container-based jobs on this runner leave root-owned files in the workspace.
        run: |
          git config --global --add safe.directory '*'
          sudo git clean -ffdx
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            `# Compiler toolchain for the in-tree pybind11 C++ extension.` \
            build-essential \
            `# Runtime lib for opencv-python (cv2 loads libGL.so.1 on import).` \
            libgl1 \
            `# Runtime lib for PyTurboJPEG (fast JPEG encode/decode).` \
            libturbojpeg \
            `# Dev package for PyAudio (built from source against PortAudio).` \
            portaudio19-dev \
            `# Chromium runtime libs required by Playwright (used by dimsim browser tests).` \
            libatk1.0-0 libatk-bridge2.0-0 libcairo2 libcups2 libgbm1 \
            libpango-1.0-0 libxcomposite1 libxdamage1 libxkbcommon0 libxrandr2 \
            `# Rerun viewer pulls in X11 keyboard bindings when DISPLAY is set.` \
            libxkbcommon-x11-0
      - name: Install dependencies
        run: uv sync --group tests-self-hosted --frozen
      - name: Build C++ extensions in-place
        run: uv run python setup.py build_ext --inplace
      - name: Run tests
        # The runner must have an Xorg server with NVIDIA GPU access running
        # on DISPLAY=:0 — dimsim's headless Chromium needs real WebGL for the
        # heavier scenes (`apt`). Software X via xvfb is not enough.
        env:
          DISPLAY: ":0"
        run: uv run pytest --cov=dimos/ --junitxml=junit.xml -m self_hosted_large
      - name: Re-run the failing tests with maximum verbosity
        if: failure()
        env:
          COLOR: yes
          DISPLAY: ":0"
        run: >-  # `exit 1` makes sure that the job remains red with flaky runs
          uv run pytest --no-cov -vvvvv --lf -m self_hosted_large && exit 1
        shell: bash
      - name: Turn coverage into xml
        run: uv run python -m coverage xml
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./coverage.xml
          flags: SelfHosted-Large
          use_oidc: true
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          report_type: test_results
          use_oidc: true
      - name: Check disk space
        if: failure()
        run: |
          df -h

  # Cross-job fail-fast: GitHub Actions only fail-fasts within a matrix,
  # not across sibling jobs. This watcher fires the moment `tests` fails
  # and cancels the whole workflow run.
  fail-fast:
    if: failure()
    needs: [tests]
    runs-on: ubuntu-latest
    permissions:
      actions: write  # For `gh run cancel`
    steps:
      - name: Cancel workflow run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}

  ci-complete:  # This is used for branch protection.
    if: always()

    needs:
    - lint
    - rust
    - md-babel
    - docs-validate
    - tests
    - self-hosted-tests
    - self-hosted-large-tests

    runs-on: ubuntu-latest
    permissions:
      id-token: write  # For codecov-action's OIDC notify

    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@release/v1
      with:
        allowed-skips: |
          self-hosted-tests
          self-hosted-large-tests
        jobs: ${{ toJSON(needs) }}
    - name: Trigger Codecov notifications
      uses: codecov/codecov-action@v6
      with:
        run_command: send-notifications
        use_oidc: true
        fail_ci_if_error: true
