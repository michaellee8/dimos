name: Bug Report
description: Report a bug in DimOS
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what happened and include any details that seem relevant.
      value: |
        ## What happened?

        ## What did you expect?

        ## Steps to reproduce
        <!-- the exact command you ran -->

        ## Environment
        <!-- OS, install method (uv, Nix, Docker), DimOS branch or commit (git rev-parse --short HEAD), robot/sim/hardware with firmware version -->

        ## Logs / screenshots

    validations:
      required: true
