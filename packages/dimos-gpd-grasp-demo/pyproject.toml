[project]
name = "dimos-gpd-grasp-demo"
version = "0.1.0"
description = "DimOS project-runtime GPD grasp detection demo package."
requires-python = ">=3.11"
dependencies = [
    "dimos",
    "gpd @ git+https://github.com/TomCC7/gpd.git@c088d8ae2f7965b067e9a12b3c0dacdbe9da924a",
]

[tool.uv.sources]
dimos = { path = "../..", editable = true }

[tool.hatch.metadata]
allow-direct-references = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
