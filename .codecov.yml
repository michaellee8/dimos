codecov:
  branch: main
  notify:
    manual_trigger: true

coverage:
  status:
    project:
    patch:

# Carry forward self-hosted, as these are not run on external PRs.
flag_management:
  individual_flags:
    - name: SelfHosted-Linux
      carryforward: true
    - name: SelfHosted-macos
      carryforward: true
    - name: SelfHosted-Large
      carryforward: true

comment:
  layout: "newheader, diff, flags, components, files, newfooter"
  require_head: false
  require_base: false
