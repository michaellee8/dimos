<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebTransport spike cockpit</title>
<style>
  body { background: #14161a; color: #d6d8dc; font: 13px/1.5 monospace; margin: 16px; }
  #status { padding: 6px 10px; border-radius: 4px; background: #333; margin-bottom: 10px; }
  #status.ok { background: #14421e; }
  #status.bad { background: #58181d; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .panel { background: #1c1f24; border: 1px solid #2a2e35; border-radius: 4px; padding: 8px; }
  .panel h3 { margin: 0 0 6px; font-size: 12px; color: #8b919b; font-weight: normal; }
  canvas { background: #0b0c0e; display: block; }
  table { border-collapse: collapse; }
  td, th { padding: 2px 10px; text-align: right; border-bottom: 1px solid #2a2e35; }
  th { color: #8b919b; font-weight: normal; }
  td:first-child, th:first-child { text-align: left; }
  #teleop { color: #8b919b; margin-top: 6px; }
</style>
</head>
<body>
<div id="status">starting…</div>
<div class="row">
  <div class="panel"><h3>video (jpeg)</h3><canvas id="video" width="640" height="360"></canvas></div>
  <div class="panel"><h3>odom trace</h3><canvas id="odom" width="320" height="320"></canvas><div id="odomText">–</div></div>
  <div class="panel"><h3>lidar top-down</h3><canvas id="lidar" width="320" height="320"></canvas><div id="lidarText">–</div></div>
</div>
<div class="row">
  <div class="panel">
    <h3>channels</h3>
    <table id="stats"><thead><tr><th>ch</th><th>Hz</th><th>KB/frame</th><th>frames</th><th>lost</th><th>ooo</th></tr></thead><tbody></tbody></table>
    <div id="rtt">rtt: –</div>
    <div id="teleop">teleop: WASD to drive (focus the page)</div>
  </div>
</div>
<script type="module" src="/main.js"></script>
</body>
</html>
