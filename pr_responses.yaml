  author: greptile-apps
  file: dimos/utils/cli/graph.py
  line: 618
  problem: |
    P1 — Server exits after the very first HTTP request, regardless of path. `do_GET` served
    the full HTML for any request, including `/favicon.ico` issued by the browser before the
    main page, causing the single-shot server to exit before the user saw the diagram.
  solution: |
    addressed by Jeff in upstream commit 482d7adb9 — non-root requests (e.g. /favicon.ico)
    now return 204 instead of consuming the single request slot with the HTML payload.
  commit: 482d7adb968fba3f689fa715a8897f2bb9bf593c

