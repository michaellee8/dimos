- pr: 2213
  comment_id: 3283876031
  author: greptile-apps
  file: dimos/utils/cli/graph.py
  line: 104
  problem: |
    P2 — `_mermaid_id` sanitizes only spaces and dashes, leaving other special characters
    intact. Names containing Mermaid-significant characters such as `[`, `]`, `(`, `)`, `.`,
    or `"` produce invalid Mermaid node IDs and break diagram rendering (e.g. `depth[0]`).
  solution: |
    fixed in this autofix branch — `_mermaid_id` now maps any non-alphanumeric character to
    `_` via `re.sub(r"[^A-Za-z0-9_]", "_", name)` and prefixes `n_` when the first character
    is not a letter, guaranteeing a syntactically valid Mermaid identifier.
  commit: f62f2f51a482e173f804b2e335f8963ce7efb8a1

