  problem: |
    P2 — Duplicate zoom/pan listeners accumulate with multiple blueprints. `setupViewport` is
    called once per blueprint tab, and each call appends an additional click listener to the
    same `zoomIn`, `zoomOut`, and `resetView` button elements (looked up by ID). With N
    blueprints, every button click fires N callbacks simultaneously.
  solution: |
    skipped — fix requires refactoring the embedded JS to move the button listeners out of
    `setupViewport` and dispatch on the currently-active panel. That spans >10 lines of JS
    inside a Python f-string template (line 425–567) and risks subtly breaking pan/zoom
    interaction. Exceeds easy threshold; symptom is mild (extra apply() calls on hidden vps).
  commit: null

