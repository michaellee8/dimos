- pr: 2112
  comment_id: 3252755025
  author: greptile-apps
  file: dimos/core/module.py
  line: 270
  problem: |
    P2 â€” `_tf_lock` is a class-level attribute, so all `ModuleBase` instances share the same
    `threading.Lock` object. Modules contend on a global lock even though their `_tf` fields
    are independent. Moving the lock to `__init__` would give each instance its own.
  solution: |
    skipped â€” `ModuleBase` is the root of every module in the codebase. Moving the lock to
    `__init__` is a one-liner in isolation but a behavior change for any subclass that
    overrides `__init__` without calling `super().__init__()` (and there are many in the
    nav_stack). Risk of latent breakage outweighs the contention concern, which only
    matters at startup. Worth doing as a dedicated PR with a careful subclass audit.
  commit: null

